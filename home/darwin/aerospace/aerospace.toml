# AeroSpace - i3-like tiling window manager for macOS
# Config: https://nikitabobko.github.io/AeroSpace/commands

after-login-command = []

after-startup-command = [
  'exec-and-forget borders active_color=0xffe1e3e4 inactive_color=0xff494d64 width=5.0',
]

start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = false

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 3
inner.vertical = 3
outer.left = 3
outer.bottom = 3
outer.top = 3
outer.right = 3

# =================================================================
# Main keybindings
# =================================================================
[mode.main.binding]

# Open Alacritty (like i3's mod+enter)
alt-enter = '''exec-and-forget osascript -e '
    tell application "Alacritty"
        activate
    end tell'
    '''

# Layout
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# Focus
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move windows
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Resize
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

# Workspaces
alt-1 = 'workspace 1Terminal'
alt-2 = 'workspace 2Browser'
alt-3 = 'workspace 3Work'
alt-4 = 'workspace 4Chat'
alt-5 = 'workspace 5Media'
alt-6 = 'workspace 6Files'
alt-7 = 'workspace 7Other'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-0 = 'workspace 0'

# Move window to workspace
alt-shift-1 = 'move-node-to-workspace 1Terminal'
alt-shift-2 = 'move-node-to-workspace 2Browser'
alt-shift-3 = 'move-node-to-workspace 3Work'
alt-shift-4 = 'move-node-to-workspace 4Chat'
alt-shift-5 = 'move-node-to-workspace 5Media'
alt-shift-6 = 'move-node-to-workspace 6Files'
alt-shift-7 = 'move-node-to-workspace 7Other'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'
alt-shift-0 = 'move-node-to-workspace 0'

# Workspace navigation
alt-tab = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# Service mode
alt-shift-semicolon = 'mode service'

# =================================================================
# Service mode
# =================================================================
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']

down = 'volume down'
up = 'volume up'
shift-down = ['volume set 0', 'mode main']

# =================================================================
# Resize mode
# =================================================================
[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
enter = 'mode main'
esc = 'mode main'

[exec]
inherit-env-vars = true
[exec.env-vars]
PATH = '/opt/homebrew/bin:/opt/homebrew/sbin:${PATH}'

# =================================================================
# Auto-assign apps to workspaces
# =================================================================

[[on-window-detected]]
if.app-id = 'org.alacritty'
run = 'move-node-to-workspace 1Terminal'

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace 2Browser'

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace 3Work'

[[on-window-detected]]
if.app-id = 'com.apple.mail'
run = 'move-node-to-workspace 3Work'

[[on-window-detected]]
if.app-id = 'com.apple.iCal'
run = 'move-node-to-workspace 3Work'

[[on-window-detected]]
if.app-id = 'com.hnc.Discord'
run = 'move-node-to-workspace 4Chat'

[[on-window-detected]]
if.app-id = 'com.colliderli.iina'
run = 'move-node-to-workspace 5Media'

[[on-window-detected]]
if.app-id = 'com.netease.163music'
run = 'move-node-to-workspace 5Media'

[[on-window-detected]]
if.app-id = 'com.tencent.QQMusicMac'
run = 'move-node-to-workspace 5Media'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = ['layout floating', 'move-node-to-workspace 6Files']

[[on-window-detected]]
if.app-id = 'com.apple.Preview'
run = ['layout floating', 'move-node-to-workspace 6Files']

[[on-window-detected]]
if.app-id = 'org.wireshark.Wireshark'
run = ['layout floating', 'move-node-to-workspace 7Other']

[[on-window-detected]]
if.app-id = 'ai.elementlabs.lmstudio'
run = ['layout floating', 'move-node-to-workspace 7Other']

[[on-window-detected]]
if.app-id = 'io.github.clash-verge-rev.clash-verge-rev'
run = 'move-node-to-workspace 7Other'

# Float these by default
[[on-window-detected]]
if.app-id = 'com.apple.SecurityAgent'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = ['layout floating']

# Default: float all unmatched windows
[[on-window-detected]]
check-further-callbacks = true
run = ['layout floating']

# =================================================================
# Monitor assignment
# =================================================================
[workspace-to-monitor-force-assignment]
1Terminal = ['main']
2Browser = ['main']
3Work = ['built-in']
4Chat = ['built-in']
5Media = ['built-in']
6Files = ['main']
7Other = ['main']
